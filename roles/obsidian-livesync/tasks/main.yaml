- name: Ensure obsidian-livesync config directory exists
  file:
    path: "{{ obsidian_livesync_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0775'

- name: Find a field labeled username in an item named obsidian-livesync-db in a specific vault
  onepassword.connect.item_info:
    token: "{{ connect_token }}"
    item: obsidian-livesync-db
    vault: "{{ ansible_vault }}"
  no_log: false  # Turn off logs to avoid logging sensitive data
  register: op_item

- name: Setting facts so that they will be persisted in the fact cache
  ansible.builtin.set_fact:
    dbUser: "{{ op_item.op_item.fields.username.value }}"
    dbPass: "{{ op_item.op_item.fields.password.value }}"

- name: Copy obsidian-livesync .env config
  template:
    src: obsidian-livesync.env.j2
    dest: "{{ obsidian_livesync_config_dir }}/.env"
    owner: root
    group: root
    mode: '0644'

- name: Copy Docker Compose file
  copy:
    src: docker-compose.yaml
    dest: "{{ obsidian_livesync_config_dir }}/docker-compose.yaml"
    mode: '0644'

- name: Start obsidian-livesync container with Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ obsidian_livesync_config_dir }}"
    state: present
  